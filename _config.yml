## Google Fonts: IBM Plex Sans / Mono, stessi font usati da IBM Carbon Design System
googlefonts:
  - url: "https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap"

# Palette scelta dal gruppo (coolors.co/palette/a1d2ce-78cad2-62a8ac-5497a7-50858b)
# Teal tenue, coerente con il tema Altair condiviso (vedi altair_carbon_theme.py).
chulapa-skin:
  vars:
    # Colori principali
    primary: "#50858b"                # teal scuro - dati/tecnologia
    secondary: "#161616"              # Carbon Gray 100 - testo
    success: "#24a148"
    danger: "#da1e28"
    warning: "#f1c21b"
    info: "#5497a7"                   # azzurro della palette originale

    # Nuovi colori narrativi (ispirati all'immagine urbana)
    urban-red: "#c96a52"              # mattone/terracotta - polarizzazione, pressione urbana
    urban-blue: "#79a9c6"             # azzurro edilizio - confronto, distribuzioni, dati

    # Toni neutri
    light: "#f3f1eb"                  # carta chiara
    dark: "#161616"
    body-bg: "#fcfbf7"                # bianco caldo editoriale
    body-color: "#161616"

    # Font
    font-family-base: "'IBM Plex Sans', -apple-system, sans-serif"
    headings-font-family: "'IBM Plex Sans', -apple-system, sans-serif"
    font-family-monospace: "'IBM Plex Mono', monospace"

    # Carbon style
    border-radius: "0"
    border-radius-lg: "0"
    border-radius-sm: "0"



##################################################
#    Non modificare nulla sotto questa riga      #
##################################################

# Impostazioni di build
#theme: chulapa-jekyll # va usato il remote-theme!!!
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

collections:
  pages:
    output: true
    permalink: /:path

footer:
  links:
  - label: "LinkedIn"
    icon: "fab fa-linkedin"
    url: https://www.linkedin.com/company/sobigdata
  - label: "Twitter"
    icon: "fab fa-twitter"
    url: https://www.twitter.com/sobigdata
  copyright: "2026 SoBigData RI"


sass:
  quiet_deps: true

# Gli elementi esclusi possono essere elaborati elencando esplicitamente le directory o
# i relativi percorsi file nella lista `include:`.
#
exclude:
 - .sass-cache/
 - .jekyll-cache/
 - gemfiles/
 - Gemfile
 - Gemfile.lock
 - node_modules/
 - vendor/bundle/
 - vendor/cache/
 - vendor/gems/
 - vendor/ruby/
 - .idea/


livereload: true

remote_theme: dieghernan/chulapa

future: true

defaults:
  - scope:
      path: "assets/images/thumb-charts"
    values:
      image_col: charts
