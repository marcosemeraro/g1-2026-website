# Benvenuto in Jekyll!
#
# Questo file di configurazione è pensato per impostazioni che interessano tutto il blog,
# valori che in genere imposti una volta e modifichi raramente. Se ti ritrovi a modificare
# spesso questo file, valuta di usare i file di dati di Jekyll per le informazioni che
# aggiorni di frequente.
#
# Per ragioni tecniche, questo file NON viene ricaricato automaticamente quando usi
# 'bundle exec jekyll serve'. Se lo modifichi, riavvia il processo del server.
#
# Se ti serve aiuto con la sintassi YAML, ecco alcune rapide reference:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#

# Impostazioni del sito
# Queste impostazioni personalizzano il sito. Nei file HTML le troverai tramite
# {{ site.title }}, {{ site.email }}, ecc. Puoi creare variabili personalizzate:
# saranno accessibili nei template tramite {{ site.myvariable }}.

title: "Template per Progettoni"
subtitle: "Questo è un template per i progetti del Master SoBigData"
description: >- # ignora i ritorni a capo fino a "baseurl:"
  Scrivi qui una descrizione accattivante per il tuo nuovo sito. Puoi modificare questa
  riga in _config.yml. Apparirà nei meta del documento head (per
  i risultati di ricerca di Google) e nella descrizione del sito in feed.xml.


# Riportare il github del gruppo di progetto e quello del sito web (se differente).
# Tali informazioni appariranno nel Footer del sito.
github_repo:
  - name: "Gruppo 1 - Repository del sito"
    url: "https://github.com/marcosemeraro/g1-2026-website/"

markdown: kramdown

baseurl: "/g1-2026-website"
#baseurl: ""
url: "https://marcosemeraro.github.io" # il dominio principale del sito senza barra finale (in questo caso il tuo username.github.io)

#################################
#    Configurazione navigazione #
#################################

navbar:
  style :  dual # non modificarlo: imposta lo stile della navbar.
  brand: # brand della navbar, mostrato a sinistra.
    title :  "Una città, Due mercati"
    img: "./assets/images/Logo_masthead.png" # non modificare
    url: /
  nav:
    - title: Articolo
      url: /articolo.html
    - title: Approfondimenti
      child:
        - title: Dati Omi
          url: /datiomi.html
        - title: Dati Elezioni
          url: /datielezioni2.html
        - title: Dati news
          url: /datinews.html
        - title: Dati Stefania 1
          url: /datistefania1.html
        - title: Dati Stefania 2
          url: /datistefania2.html

    - title: SBD Master # deve essere sempre l'ultimo elemento della navbar, non modificarlo
      url: https://masterbigdata.it/

